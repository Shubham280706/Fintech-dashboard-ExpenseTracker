services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      SUPABASE_URL: ${DOCKER_SUPABASE_URL:-http://host.docker.internal:54321}
      CORS_ORIGINS: ${DOCKER_CORS_ORIGINS:-http://localhost:3000}
      PORT: ${DOCKER_BACKEND_PORT:-8000}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - frontend/.env
    environment:
      REACT_APP_BACKEND_URL: ${DOCKER_FRONTEND_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
